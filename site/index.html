<!doctype html>
<html lang="ru">
  <head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-content="meta.title"></title>
    <meta
      name="description"
      data-content-meta="description"
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=6">
  </head>
  <body>
    <header class="site-header" data-header>
      <a class="brand" href="#home" aria-label="Go to home screen">
        <span class="brand-mark" data-content="header.brandInitials"></span>
        <span class="brand-text" data-content="header.brandName"></span>
      </a>

      <button class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false" data-nav-toggle>
        <span></span>
        <span></span>
      </button>

      <nav class="site-nav" aria-label="Main navigation" data-nav data-content-list="header.nav"></nav>
    </header>

    <main class="snap-root">
      <section class="screen hero-screen" id="home" aria-label="Home screen">
        <div class="screen-inner hero-layout">
          <div class="hero-copy">
            <p class="eyebrow" data-content="hero.eyebrow"></p>
            <h1 data-content="hero.title"></h1>
            <p class="hero-lead" data-content="hero.lead"></p>
            <div class="hero-actions">
              <a class="button button-primary" data-content-href="hero.primaryButton.href" data-content="hero.primaryButton.text"></a>
              <a class="button button-secondary" data-content-href="hero.secondaryButton.href" data-content="hero.secondaryButton.text"></a>
            </div>
          </div>

          <div class="hero-art" aria-label="Decorative art composition">
            <img data-content-src="hero.artImage" data-content-alt="hero.artAlt">
          </div>
        </div>
      </section>

      <section class="screen about-screen" id="about">
        <div class="screen-inner two-column">
          <div class="section-copy">
            <p class="eyebrow" data-content="about.eyebrow"></p>
            <h2 data-content="about.heading"></h2>
            <p class="text-tertiary" data-content="about.text"></p>
            <button type="button" data-video-trigger data-video-src="../site/data/hello.mp4">video greeting</button><br>
            <button type="button" data-video-trigger data-video-src="../site/data/lesson_01.mp4">example of a lesson #1</button><br>
            <button type="button" data-video-trigger data-video-src="../site/data/lesson_02.mp4">example of a lesson #2</button>
            
            <dialog class="video-dialog" data-video-dialog>
              <button class="dialog-close" type="button" aria-label="Close" data-video-dialog-close>x</button>
              <video data-video-dialog-video controls></video>
            </dialog>
            <div class="fact-grid" data-content-list-facts="about.facts"></div>
          </div>

          <figure class="portrait-card">
            <img data-content-src="about.portraitImage" data-content-alt="about.portraitAlt">
            
          </figure>
        </div>
      </section>

      <section class="screen philosophy-screen" id="philosophy">
        <div class="screen-inner">
          <div class="section-heading">
            <p class="eyebrow" data-content="philosophy.eyebrow"></p>
            <h2 data-content="philosophy.heading"></h2>
            <p class="text-tertiary" data-content="philosophy.text"></p>
          </div>

          <div class="principles" data-content-list-principles="philosophy.principles"></div>
        </div>
      </section>

      <section class="screen cv-screen" id="cv">
        <div class="screen-inner cv-layout">
          <div class="section-copy">
            <p class="eyebrow" data-content="cv.eyebrow"></p>
            <h2 data-content="cv.heading"></h2>
            <p class="text-tertiary" data-content="cv.intro"></p>
            <p><a href="../site/data/Maria_Sverdlik_Resume_Creative.pdf" download>Download My CV</a></p>
          </div>

          <div class="timeline" aria-label="Professional biography" data-content-list-timeline="cv.timeline"></div>
        </div>
      </section>

      <section class="screen gallery-screen" id="works">
        <div class="screen-inner gallery-layout">
          <div class="gallery-top">
            <div>
              <p class="eyebrow" data-content="works.eyebrow"></p>
              <h2 data-content="works.heading"></h2>
            </div>
            <div class="filters" data-filters="works" aria-label="My works filters"></div>
          </div>

          <div class="gallery-scroll" data-gallery="works" tabindex="0" aria-label="My works gallery"></div>
        </div>
      </section>

      <section class="screen gallery-screen students-screen" id="students">
        <div class="screen-inner gallery-layout">
          <div class="gallery-top">
            <div>
              <p class="eyebrow" data-content="students.eyebrow"></p>
              <h2 data-content="students.heading"></h2>
            </div>
            <div class="filters" data-filters="students" aria-label="Student works filters"></div>
          </div>

          <div class="gallery-scroll" data-gallery="students" tabindex="0" aria-label="Student works gallery"></div>
        </div>
      </section>

      <section class="screen contacts-screen" id="contacts">
        <div class="screen-inner contacts-layout">
          <div class="section-copy">
            <p class="eyebrow" data-content="contacts.eyebrow"></p>
            <h2 data-content="contacts.heading"></h2>
            <p class="text-tertiary" data-content="contacts.intro"></p>

            <address class="contact-list">
              <a data-content-href="mailto:contacts.email" data-content="contacts.email"></a>
              <a data-content-href="tel:contacts.phone" data-content="contacts.phone"></a>
              <span data-content="contacts.availability"></span>
              <a href="https://www.artstation.com/heykel409" target="_blank" rel="noopener noreferrer">My Artstation</a>
            </address>
          </div>
        </div>
      </section>
    </main>

    <dialog class="art-dialog" data-dialog>
      <button class="dialog-close" type="button" aria-label="Close" data-dialog-close>x</button>
      <img src="" alt="" data-dialog-image>
      <div>
        <p class="eyebrow" data-dialog-meta></p>
        <h3 data-dialog-title></h3>
        <p data-dialog-description></p>
      </div>
    </dialog>

    <script src="script.js?v=6"></script>
  </body>
</html>
