<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Maria Sverdlik</title>
<style>
  :root {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #1e1f1c;
    color: #1e1f1c;
  }
  .gate-card {
    width: min(360px, calc(100% - 32px));
    background: #ffffff;
    padding: 32px 28px;
    border: 1px solid rgba(0,0,0,0.08);
  }
  h1 {
    margin: 0 0 6px;
    font-size: 18px;
    font-weight: 700;
  }
  p.lead {
    margin: 0 0 24px;
    font-size: 13px;
    color: #6b6b66;
  }
  label {
    display: grid;
    gap: 6px;
    margin-bottom: 14px;
    font-size: 13px;
    font-weight: 600;
    color: #6b6b66;
  }
  input {
    font: inherit;
    padding: 10px 12px;
    border: 1px solid rgba(0,0,0,0.16);
    background: #fff;
  }
  button {
    width: 100%;
    margin-top: 8px;
    padding: 11px;
    border: 1px solid #1e1f1c;
    background: #1e1f1c;
    color: #fff;
    font: inherit;
    font-weight: 700;
    cursor: pointer;
  }
  .error {
    margin-top: 12px;
    font-size: 13px;
    color: #b3473d;
    display: none;
  }
  .error.show {
    display: block;
  }
</style>
</head>
<body>

  <div class="gate-card">
    <h1>Maria Sverdlik</h1>
    <p class="lead">Введите логин и пароль для доступа.</p>

    <form id="gate-form" autocomplete="off">
      <label>
        Логин
        <input type="text" id="gate-login" autocomplete="username">
      </label>
      <label>
        Пароль
        <input type="password" id="gate-password" autocomplete="current-password">
      </label>
      <button type="submit">Войти</button>
      <p class="error" id="gate-error">Неверный логин или пароль.</p>
    </form>
  </div>

<script>
  // Простая защита от случайных людей. Логин и пароль видны в исходном коде,
  // это не защищает от тех, кто умеет открыть "просмотр кода страницы".
  const VALID_LOGIN = "maria";
  const VALID_PASSWORD = "art2026studio";

  // Папка с реальным сайтом — задай своё имя, не делай его очевидным.
  const TARGET_PATH = "site/index.html";

  const form = document.getElementById("gate-form");
  const errorEl = document.getElementById("gate-error");

  form.addEventListener("submit", (event) => {
    event.preventDefault();
    const login = document.getElementById("gate-login").value.trim();
    const password = document.getElementById("gate-password").value;

    if (login === VALID_LOGIN && password === VALID_PASSWORD) {
      window.location.href = TARGET_PATH;
    } else {
      errorEl.classList.add("show");
    }
  });
</script>

</body>
</html>
